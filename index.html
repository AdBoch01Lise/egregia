<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGREGIA</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash: centered EGREGIA + tagline -->
    <div id="splash" class="splash">
        <h1 class="splash-title">EGREGIA</h1>
        <p class="splash-tagline">Structurer, Transmettre, Durer</p>
    </div>

    <!-- Main layout + Content panel: same 3-column grid, centered at mid-page -->
    <div id="page-wrapper" class="page-wrapper">
        <main id="main" class="main">
            <div class="content-layout">
                <div class="layout-left">
                    <h1 class="brand">EGREGIA</h1>
                </div>
                <div class="layout-center">
                    <!-- Empty on landing -->
                </div>
                <div class="layout-right">
                    <nav class="nav-links">
                        <button type="button" class="nav-link" data-page="apropos">À propos</button>
                        <button type="button" class="nav-link" data-page="credo">Credo</button>
                        <a href="mailto:contact@egregia.fr?subject=Premier%20contact" class="nav-link nav-contact">Contact</a>
                    </nav>
                    <p class="tagline">Structurer, Transmettre, Durer</p>
                    <div class="credits">
                        <p class="location-time">France, <span id="clock">00:00:00</span></p>
                        <p class="copyright">© 2026, Egregia</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Content panel: slides up/down, same grid so right box stays aligned -->
        <div id="content-panel" class="content-panel">
            <div class="content-panel-inner">
                <div class="content-layout">
                    <div class="layout-left">
                        <h1 class="brand">EGREGIA</h1>
                    </div>
                    <div class="layout-center layout-center-scroll">
                        <article id="content-body" class="content-body">
                            <!-- Content injected by JS -->
                        </article>
                    </div>
                    <div class="layout-right">
                        <nav class="content-nav">
                            <button type="button" class="nav-link nav-retour" id="btn-retour">Retour</button>
                            <a href="mailto:contact@egregia.fr?subject=Premier%20contact" class="nav-link nav-contact">Contact</a>
                        </nav>
                        <p class="tagline">Structurer, Transmettre, Durer</p>
                        <p class="location-time">France, <span id="clock-panel">00:00:00</span></p>
                        <p class="copyright">© 2026, Egregia</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
